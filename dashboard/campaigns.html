<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campañas - WhatsApp Bulk SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="p-4 text-center">
            <i class="bi bi-whatsapp text-success fs-2"></i>
            <h4 class="mt-2 fw-bold">WA Bulk SaaS</h4>
        </div>
        <nav class="nav flex-column mb-4">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="contacts.html"><i class="bi bi-person-lines-fill"></i> Contactos</a>
            <a class="nav-link active" href="campaigns.html"><i class="bi bi-megaphone"></i> Campañas</a>
            <a class="nav-link" href="send.html"><i class="bi bi-send-fill"></i> Enviar Mensajes</a>
            <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i> Configuración</a>
            <hr class="mx-3 border-secondary">
            <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <header class="mb-5">
            <h2 class="fw-bold mb-0">Campañas</h2>
            <p class="text-muted">Crea y administra tus plantillas de mensajes</p>
        </header>

        <div class="row g-4">
            <!-- Formulario de Creación -->
            <div class="col-lg-7">
                <div class="card card-glass p-4 border-0">
                    <h5 class="fw-bold mb-4">Nueva Campaña</h5>
                    <form id="campaignForm">
                        <div class="mb-3">
                            <label class="form-label">Nombre de la Campaña</label>
                            <input type="text" id="campaignName" class="form-control" placeholder="Ej: Promo de Verano" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label d-flex justify-content-between">
                                Mensaje
                                <span class="text-muted small" id="charCounter">0 caracteres</span>
                            </label>
                            <textarea id="campaignMessage" class="form-control" rows="6" placeholder="Escribe tu mensaje aquí..." required></textarea>
                            <div class="mt-2">
                                <button type="button" class="btn btn-sm btn-light border" onclick="addEmoji('👋')">👋</button>
                                <button type="button" class="btn btn-sm btn-light border" onclick="addEmoji('🔥')">🔥</button>
                                <button type="button" class="btn btn-sm btn-light border" onclick="addEmoji('✅')">✅</button>
                                <button type="button" class="btn btn-sm btn-light border" onclick="addEmoji('🚀')">🚀</button>
                                <button type="button" class="btn btn-sm btn-light border" onclick="addEmoji('🎁')">🎁</button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-whatsapp w-100">
                            <i class="bi bi-save"></i> Guardar Campaña
                        </button>
                    </form>
                </div>
            </div>

            <!-- Vista Previa -->
            <div class="col-lg-5">
                <div class="card card-glass p-0 border-0 overflow-hidden" style="max-width: 350px; margin: 0 auto; min-height: 500px; background: #e5ddd5;">
                    <div class="bg-success text-white p-3 d-flex align-items-center gap-3">
                        <i class="bi bi-arrow-left"></i>
                        <div class="rounded-circle bg-light" style="width: 40px; height: 40px;"></div>
                        <div class="flex-grow-1">
                            <h6 class="mb-0 fw-bold">Vista Previa</h6>
                            <small class="opacity-75">En línea</small>
                        </div>
                    </div>
                    <div class="p-3">
                        <div class="bg-white p-3 rounded shadow-sm ms-auto" style="max-width: 85%; position: relative;">
                            <p id="previewText" class="mb-1 text-break" style="white-space: pre-wrap;">Tu mensaje aparecerá aquí...</p>
                            <div class="text-end">
                                <small class="text-muted" style="font-size: 10px;">12:00 PM ✓✓</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <hr class="my-5">

        <!-- Lista de Campañas -->
        <h5 class="fw-bold mb-4">Tus Campañas Guardadas</h5>
        <div class="row g-3" id="campaignsList">
            <!-- Cargado dinámicamente -->
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/campaigns.js"></script>
</body>
</html>
