<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WhatsApp Bulk SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="p-4 text-center">
            <i class="bi bi-whatsapp text-success fs-2"></i>
            <h4 class="mt-2 fw-bold">WA Bulk SaaS</h4>
        </div>
        <nav class="nav flex-column mb-4">
            <a class="nav-link active" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="contacts.html"><i class="bi bi-person-lines-fill"></i> Contactos</a>
            <a class="nav-link" href="campaigns.html"><i class="bi bi-megaphone"></i> Campañas</a>
            <a class="nav-link" href="send.html"><i class="bi bi-send-fill"></i> Enviar Mensajes</a>
            <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i> Configuración</a>
            <hr class="mx-3 border-secondary">
            <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
        </nav>

        <div class="mt-auto p-3">
            <div class="form-check form-switch ms-3">
                <input class="form-check-input" type="checkbox" id="darkModeToggle">
                <label class="form-check-label text-muted" for="darkModeToggle">Modo Oscuro</label>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-0">Resumen de Actividad</h2>
                <p class="text-muted" id="welcomeMessage">Bienvenido de nuevo</p>
            </div>
            <button class="btn btn-outline-secondary d-lg-none" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
        </header>

        <!-- Stats Cards -->
        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="card stat-card card-glass">
                    <div class="stat-icon bg-success bg-opacity-10 text-success">
                        <i class="bi bi-people"></i>
                    </div>
                    <h6 class="text-muted">Total Contactos</h6>
                    <h2 class="mb-0 fw-bold" id="statContacts">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card card-glass">
                    <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                        <i class="bi bi-send"></i>
                    </div>
                    <h6 class="text-muted">Mensajes Enviados</h6>
                    <h2 class="mb-0 fw-bold" id="statSent">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card card-glass">
                    <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                        <i class="bi bi-megaphone"></i>
                    </div>
                    <h6 class="text-muted">Campañas Creadas</h6>
                    <h2 class="mb-0 fw-bold" id="statCampaigns">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card card-glass">
                    <div class="stat-icon bg-danger bg-opacity-10 text-danger">
                        <i class="bi bi-clock-history"></i>
                    </div>
                    <h6 class="text-muted">Mensajes Pendientes</h6>
                    <h2 class="mb-0 fw-bold" id="statPending">0</h2>
                </div>
            </div>
        </div>

        <!-- Recent Activity Table Placeholder -->
        <div class="card card-glass p-4 border-0">
            <h5 class="fw-bold mb-4">Historial Reciente</h5>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Campaña</th>
                            <th>Contacto</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="recentMessagesTable">
                        <tr>
                            <td colspan="4" class="text-center text-muted">No hay actividad reciente</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
