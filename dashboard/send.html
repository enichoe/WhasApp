<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Mensajes - WhatsApp Bulk SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="p-4 text-center">
            <i class="bi bi-whatsapp text-success fs-2"></i>
            <h4 class="mt-2 fw-bold">WA Bulk SaaS</h4>
        </div>
        <nav class="nav flex-column mb-4">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="contacts.html"><i class="bi bi-person-lines-fill"></i> Contactos</a>
            <a class="nav-link" href="campaigns.html"><i class="bi bi-megaphone"></i> Campañas</a>
            <a class="nav-link active" href="send.html"><i class="bi bi-send-fill"></i> Enviar Mensajes</a>
            <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i> Configuración</a>
            <hr class="mx-3 border-secondary">
            <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <header class="mb-5">
            <h2 class="fw-bold mb-0">Enviar Mensajes</h2>
            <p class="text-muted">Inicia tu campaña de envío masivo</p>
        </header>

        <div class="row g-4">
            <!-- Configuración de Envío -->
            <div class="col-lg-5">
                <div class="card card-glass p-4 border-0 mb-4">
                    <h5 class="fw-bold mb-4">Configuración</h5>
                    
                    <div class="mb-3">
                        <label class="form-label">Seleccionar Campaña</label>
                        <select id="campaignSelect" class="form-select">
                            <option value="">Cargando campañas...</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Intervalo entre mensajes (Delay)</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="delay" id="delay3" value="3000" checked>
                            <label class="btn btn-outline-success" for="delay3">3s</label>
                            
                            <input type="radio" class="btn-check" name="delay" id="delay5" value="5000">
                            <label class="btn btn-outline-success" for="delay5">5s</label>
                            
                            <input type="radio" class="btn-check" name="delay" id="delay10" value="10000">
                            <label class="btn btn-outline-success" for="delay10">10s</label>
                        </div>
                    </div>

                    <button class="btn btn-whatsapp w-100 py-3 fw-bold" id="btnStartSending">
                        <i class="bi bi-play-fill"></i> EMPEZAR ENVÍO
                    </button>
                    <button class="btn btn-outline-danger w-100 mt-2 d-none" id="btnStopSending">
                        <i class="bi bi-stop-fill"></i> DETENER
                    </button>
                </div>

                <!-- Progreso -->
                <div class="card card-glass p-4 border-0 d-none" id="progressCard">
                    <h5 class="fw-bold mb-3">Progreso de Envío</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span id="progressText">0 / 0 enviados</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress mb-3" style="height: 10px;">
                        <div id="progressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <div id="currentStatus" class="small text-muted text-center italic">Esperando...</div>
                </div>
            </div>

            <!-- Lista de Destinatarios -->
            <div class="col-lg-7">
                <div class="card card-glass p-4 border-0">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">Destinatarios</h5>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="selectAllContacts" checked>
                            <label class="form-check-label" for="selectAllContacts">Seleccionar todos</label>
                        </div>
                    </div>
                    <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                        <table class="table table-sm align-middle">
                            <tbody id="sendContactsList">
                                <tr>
                                    <td colspan="2" class="text-center text-muted">Cargando contactos...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/send.js"></script>
</body>
</html>
