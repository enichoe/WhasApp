<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bulk SaaS</title>
    <!-- Redirección automática -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        async function checkSession() {
            try {
                // Timeout de seguridad para evitar esperas infinitas
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Timeout de conexión')), 5000)
                );

                const sessionPromise = supabase.auth.getSession();
                
                const { data: { session } } = await Promise.race([sessionPromise, timeoutPromise]);
                
                if (session) {
                    window.location.href = 'dashboard/dashboard.html';
                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error en checkSession:', error);
                // Si hay un error (ej. falta internet o error de config), redirigimos al login
                // para que el usuario pueda intentar de nuevo o ver el error allí.
                window.location.href = 'login.html';
            }
        }
        
        // Esperamos a que los scripts se carguen completamente
        window.onload = checkSession;
    </script>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
        <p>Cargando aplicación...</p>
    </div>
</body>
</html>
