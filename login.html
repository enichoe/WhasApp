<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WhatsApp Bulk SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="auth-container">
    
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-whatsapp text-success fs-1"></i>
            <h2 class="mt-2 fw-bold">Bienvenido</h2>
            <p class="text-muted">Accede a tu panel de administración</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="admin@empresa.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-whatsapp w-100 mb-3" id="btnLogin">
                Entrar <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>
        </form>

        <div class="text-center">
            <p class="mb-0">¿No tienes cuenta? <a href="register.html" class="text-success text-decoration-none fw-bold">Regístrate</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
